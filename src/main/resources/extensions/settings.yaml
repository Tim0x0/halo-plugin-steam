apiVersion: v1alpha1
kind: Setting
metadata:
  name: steam-settings
spec:
  forms:
    - group: basic
      label: 基本配置
      formSchema:
        - $el: div
          attrs:
            class: "text-sm"
            style: |
              margin-bottom: 1rem;
              margin-top: -0.5rem;
              padding: 0.75rem 1rem;
              background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
              border-radius: 0.5rem;
              border: 1px solid #bae6fd;
          children:
            - $el: div
              attrs:
                style: |
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  flex-wrap: wrap;
                  gap: 0.5rem;
              children:
                - $el: span
                  attrs:
                    style: "color: #0369a1; font-weight: 500;"
                  children: "💡 配置前必读"
                - $el: div
                  attrs:
                    style: "display: flex; gap: 0.5rem;"
                  children:
                    - $el: a
                      attrs:
                        href: "https://steamcommunity.com/dev/apikey"
                        target: "_blank"
                        style: |
                          color: #0369a1;
                          text-decoration: none;
                          font-size: 0.75rem;
                          border-bottom: 1px dashed #0369a1;
                      children: "获取 API Key"
                    - $el: span
                      attrs:
                        style: "color: #bae6fd;"
                      children: "|"
                    - $el: a
                      attrs:
                        href: "https://steamid.io/"
                        target: "_blank"
                        style: |
                          color: #0369a1;
                          text-decoration: none;
                          font-size: 0.75rem;
                          border-bottom: 1px dashed #0369a1;
                      children: "查询 Steam ID"
            - $el: div
              attrs:
                style: |
                  margin-top: 0.5rem;
                  color: #0369a1;
                  font-size: 0.75rem;
                  line-height: 1.5;
              children:
                - $el: p
                  children: "1. 请务必将 Steam 个人资料隐私设置为「公开」，否则无法获取数据"
                - $el: p
                  children: "2. 如果国内服务器请求失败，请在「代理配置」中设置 HTTP 代理或 API 反代"
        - $formkit: verificationForm
          action: /apis/console.api.steam.timxs.com/v1alpha1/verify
          label: 验证配置
          children:
            - $formkit: password
              name: apiKey
              label: Steam API Key
              help: 从 Steam 开发者页面获取 https://steamcommunity.com/dev/apikey。修改后需刷新缓存或等待缓存过期后生效
              validation: required
            - $formkit: text
              name: steamId
              label: Steam ID
              help: 17位数字格式，如 76561198000000000。修改后需刷新缓存或等待缓存过期后生效
              validation: required
        - $formkit: number
          name: cacheTtlMinutes
          label: 缓存过期时间（分钟）
          value: 10
          min: 1
          validation: "required|min:1"
          help: 数据缓存时间。已缓存的数据不会立即应用新的过期时间，需点击"刷新缓存"重新缓存
        - $formkit: range
          name: apiTimeoutSeconds
          id: apiTimeoutSeconds
          key: apiTimeoutSeconds
          label: API 请求超时时间（秒）
          value: 8
          min: 5
          max: 60
          step: 1
          help: "$: '当前值：' + $get(apiTimeoutSeconds).value + ' 秒。主题模板调用受框架限制，最大 9 秒；REST API 不受此限制'"
        - $el: div
          attrs:
            class: formkit-actions
            style:
              paddingTop: "16px"
              marginBottom: "16px"
          children:
            - $el: script
              attrs:
                type: text/javascript
              children: |
                async function refreshSteamCache() {
                  const btn = document.getElementById('refreshSteamCacheBtn');
                  const btnText = document.getElementById('refreshSteamCacheBtnText');
                  btn.disabled = true;
                  const oldText = btnText.textContent;
                  btnText.textContent = '刷新中...';
                  try {
                    const response = await fetch('/apis/console.api.steam.timxs.com/v1alpha1/refresh', {
                      method: 'POST',
                      headers: {
                        'Content-Type': 'application/json',
                      },
                    });
                    const result = await response.json();
                    if (response.ok) {
                      alert(result.message || '缓存刷新成功！');
                    } else {
                      throw new Error(result.message || '刷新失败');
                    }
                  } catch (err) {
                    alert('刷新失败：' + err.message);
                  } finally {
                    btn.disabled = false;
                    btnText.textContent = oldText;
                  }
                }
            - $el: button
              attrs:
                type: button
                id: refreshSteamCacheBtn
                onclick: "refreshSteamCache()"
                class: "btn-sm btn-primary btn flex items-center gap-2"
              children:
                - $el: span
                  attrs:
                    id: refreshSteamCacheBtnText
                  children: 刷新缓存
            - $el: div
              attrs:
                class: "formkit-help text-xs text-gray-500"
                style:
                  marginTop: "8px"
              children: "立即刷新 Steam 数据缓存"

    - group: page
      label: 页面配置
      formSchema:
        - $formkit: text
          name: pageTitle
          label: 页面标题
          value: Steam 游戏库
          help: Steam 页面的标题
        - $formkit: number
          name: pageSize
          label: 每页显示数量
          value: 12
          min: 1
          max: 100
          help: 游戏库分页每页显示的游戏数量
        - $formkit: number
          name: gamesLimit
          label: 游戏库总数量限制
          value: 50
          min: 0
          max: 500
          help: 游戏库最多显示的游戏数量（按游玩时长排序），设为 0 则不限制
        - $formkit: number
          name: recentGamesLimit
          label: 最近游玩显示数量
          value: 5
          min: 1
          max: 20
          help: 最近游玩页面显示的游戏数量
        - $formkit: checkbox
          name: showRecentAchievements
          label: 显示最近游玩成就进度
          value: false
          help: 开启后会在最近游玩的游戏卡片上显示成就完成进度，会增加页面加载时间
        - $formkit: checkbox
          name: enableGameLink
          label: 点击游戏卡片跳转 Steam 商城
          value: false
          help: 关闭后点击游戏卡片不会跳转到 Steam 商城页面
        - $formkit: checkbox
          name: includeFreeGames
          label: 包含免费游戏
          value: true
          help: 开启后游戏库会包含玩过的免费游戏（如 CS2、Dota 2 等）。修改后需刷新缓存或等待缓存过期后生效
        - $formkit: array
          name: hiddenGames
          label: 隐藏的游戏
          addLabel: 添加游戏
          help: "如何获取游戏 ID？1. 打开游戏的 Steam 商店页面（如 https://store.steampowered.com/app/730/）2. 链接中的数字（730）就是游戏 ID。3. 可直接粘贴链接或只输入数字。"
          children:
            - $formkit: text
              name: game
              label: 游戏 ID 或链接
              placeholder: "730 或 https://store.steampowered.com/app/730/"
              validation: required
          value: []
 
    - group: badge
      label: 徽章配置
      formSchema:
        - $formkit: array
          name: badgeMappings
          label: 系统徽章图片映射
          addLabel: 添加映射
          help: "配置 Steam 系统徽章的图片 URL。badgeId 可在 Steam 徽章页面 URL 中查看（如 /badges/1 中的 1）"
          children:
            - $formkit: number
              name: badgeId
              label: Badge ID
              validation: required
              help: "Steam 徽章 ID"
            - $formkit: text
              name: name
              label: 徽章名称
              help: "便于识别（可选）"
            - $formkit: text
              name: imageUrl
              label: 图片 URL
              validation: required
              help: "徽章图片完整地址，可从 Steam 页面右键复制"
          value: []

    - group: stats
      label: 统计
      formSchema:
        - $formkit: switch
          name: enableTracking
          id: enableTracking
          key: enableTracking
          label: 启用游戏时长追踪
          value: false
          help: 开启后将每小时追踪游戏时长变化，用于生成热力图。首次启用后需等待至少 1 小时才会有数据
        - $formkit: number
          name: retentionDays
          label: 数据保留天数
          value: 365
          min: 30
          max: 3650
          help: 每日游戏时长记录的保留天数，超过此天数的数据将被自动清理（每天凌晨 3 点执行）
          if: "$get(enableTracking).value === true"
        - $el: div
          attrs:
            class: "formkit-help text-sm text-gray-600 bg-blue-50 p-3 rounded"
            style:
              marginTop: "16px"
          if: "$get(enableTracking).value === true"
          children:
            - $el: p
              attrs:
                style:
                  marginBottom: "8px"
              children: "⚠️ 重要说明："
            - $el: ul
              attrs:
                style:
                  listStyleType: "disc"
                  paddingLeft: "20px"
              children:
                - $el: li
                  children: "热力图功能通过定时任务（每小时第 59 分钟）追踪游戏时长变化"
                - $el: li
                  children: "Steam API 不提供历史数据，只能从启用功能后开始记录"
                - $el: li
                  children: "首次发现的游戏不会记录当前累计时长，从下次追踪开始计算"
                - $el: li
                  children: "服务器停机期间的游戏时长无法准确追踪"
                - $el: li
                  children: "数据存储在 Halo 数据库中，禁用功能不会删除已有数据"
        - $el: div
          attrs:
            class: formkit-actions
            style:
              paddingTop: "16px"
              marginBottom: "16px"
              borderBottom: "1px solid #e5e7eb"
              paddingBottom: "16px"
          if: "$get(enableTracking).value === true"
          children:
            - $el: script
              attrs:
                type: text/javascript
              children: |
                async function manualTrackPlaytime() {
                  const btn = document.getElementById('manualTrackBtn');
                  const btnText = document.getElementById('manualTrackBtnText');
                  btn.disabled = true;
                  const oldText = btnText.textContent;
                  btnText.textContent = '追踪中...';
                  try {
                    const response = await fetch('/apis/console.api.steam.timxs.com/v1alpha1/heatmap/track', {
                      method: 'POST',
                      headers: {
                        'Content-Type': 'application/json',
                      },
                    });
                    const result = await response.json();
                    if (response.ok && result.success) {
                      alert(result.message || '追踪完成！');
                    } else {
                      throw new Error(result.message || '追踪失败');
                    }
                  } catch (err) {
                    alert('追踪失败：' + err.message);
                  } finally {
                    btn.disabled = false;
                    btnText.textContent = oldText;
                  }
                }
            - $el: button
              attrs:
                type: button
                id: manualTrackBtn
                onclick: "manualTrackPlaytime()"
                class: "btn-sm btn-secondary btn flex items-center gap-2"
              children:
                - $el: span
                  attrs:
                    id: manualTrackBtnText
                  children: 手动追踪时长
            - $el: div
              attrs:
                class: "formkit-help text-xs text-gray-500"
                style:
                  marginTop: "8px"
              children: "立即执行一次游戏时长追踪（用于测试）"
        
        # 热力图显示配置组
        - $formkit: group
          name: heatmapDisplay
          label: 热力图显示
          if: "$get(enableTracking).value === true"
          children:
            - $formkit: switch
              name: showHeatmap
              id: showHeatmap
              key: showHeatmap
              label: 在页面显示热力图
              value: false
              help: 开启后会在统计栏下方显示游戏时长热力图
            - $formkit: number
              name: heatmapDays
              label: 显示天数
              value: 365
              min: 30
              max: 730
              help: 热力图显示最近多少天的数据（默认 365 天，即一年）
              if: "$get(showHeatmap).value === true"
            - $formkit: select
              name: heatmapColorTheme
              label: 颜色主题
              value: steam
              options:
                - label: Steam 蓝色
                  value: steam
                - label: GitHub 绿色
                  value: github
                - label: 火焰橙色
                  value: fire
                - label: 紫色梦幻
                  value: purple
              help: 选择热力图的颜色风格
              if: "$get(showHeatmap).value === true"
            - $formkit: checkbox
              name: heatmapShowLegend
              label: 显示图例
              value: false
              help: 是否显示热力图的颜色图例
              if: "$get(showHeatmap).value === true"
            - $formkit: text
              name: echartsUrl
              label: ECharts JS 地址
              value: https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js
              help: "热力图依赖 ECharts，可替换为自有服务器或其他 CDN 地址。默认：https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"
              if: "$get(showHeatmap).value === true"
    - group: editor
      label: 编辑器配置
      formSchema:
        - $formkit: text
          name: darkModeSelector
          label: 暗色模式选择器
          value: "html.dark"
          help: "用于游戏卡片自适应主题自动检测暗色模式。填写暗色模式激活时页面上存在的 CSS 选择器。常见值：html.dark、html[data-color-scheme=dark]、html[data-theme=dark]。可通过浏览器 F12 查看 html 元素的属性变化来确定。"
        - $formkit: select
          name: storeLanguage
          label: 游戏卡片语言
          value: auto
          options:
            - label: "自动（浏览器语言）"
              value: auto
            - label: "简体中文"
              value: schinese
            - label: "繁體中文"
              value: tchinese
            - label: "English"
              value: english
            - label: "日本語"
              value: japanese
            - label: "한국어"
              value: koreana
            - label: "Deutsch"
              value: german
            - label: "Français"
              value: french
          help: "Steam 游戏卡片显示的语言和价格货币。「自动」根据访客浏览器语言决定。修改后需刷新缓存或等待缓存过期后生效"    
    - group: proxy
      label: 代理配置
      formSchema:
        - $formkit: group
          name: imageProxy
          label: 图片加速
          children:
            - $formkit: text
              name: headerImageTemplate
              label: 游戏封面图加速地址
              value: https://cdn.cloudflare.steamstatic.com/steam/apps/{appid}/header.jpg
              help: "默认值：https://cdn.cloudflare.steamstatic.com/steam/apps/{appid}/header.jpg。支持占位符: {appid}"
            - $formkit: text
              name: iconImageTemplate
              label: 游戏图标加速地址
              value: https://media.steampowered.com/steamcommunity/public/images/apps/{appid}/{hash}.jpg
              help: "默认值：https://media.steampowered.com/steamcommunity/public/images/apps/{appid}/{hash}.jpg。支持占位符: {appid}, {hash}"
            - $formkit: text
              name: storeImageCdn
              label: 游戏卡片封面图加速域名（实验性）
              value: ""
              help: "留空使用 Steam 原始地址。填入 CDN 域名（如 https://my-cdn.com）后将替换原图片 URL 的域名部分"
        - $formkit: group
          name: apiProxy
          label: Steam API 代理
          children:
            - $formkit: switch
              name: enabled
              id: apiProxyEnabled
              key: apiProxyEnabled
              label: 启用 Steam API 代理
              value: false
              help: 修改后需刷新缓存或等待缓存过期后生效
            - $formkit: radio
              name: proxyType
              id: apiProxyType
              key: apiProxyType
              label: 代理方式
              value: http
              options:
                - label: HTTP 代理
                  value: http
                - label: 自定义 API 地址
                  value: custom
              if: "$get(apiProxyEnabled).value === true"
            - $formkit: text
              name: httpHost
              id: httpHost
              key: httpHost
              label: 代理主机
              placeholder: "127.0.0.1"
              validation: required
              help: 修改后需刷新缓存或等待缓存过期后生效
              if: "$get(apiProxyEnabled).value === true && $get(apiProxyType).value === 'http'"
            - $formkit: number
              name: httpPort
              id: httpPort
              key: httpPort
              label: 代理端口
              placeholder: "7890"
              min: 1
              max: 65535
              validation: required
              help: 修改后需刷新缓存或等待缓存过期后生效
              if: "$get(apiProxyEnabled).value === true && $get(apiProxyType).value === 'http'"
            - $formkit: text
              name: customApiUrl
              id: customApiUrl
              key: customApiUrl
              label: 自定义 API 地址
              placeholder: "https://your-steam-api-proxy.com"
              help: "替换 api.steampowered.com 的地址。修改后需刷新缓存或等待缓存过期后生效"
              validation: required
              if: "$get(apiProxyEnabled).value === true && $get(apiProxyType).value === 'custom'"

    

